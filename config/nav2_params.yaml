amcl:
  ros__parameters:
    use_sim_time: false

    # Frames
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map

    # Input scan
    scan_topic: /scan

    # AMCL particle filter
    min_particles: 1500
    max_particles: 8000
    resample_interval: 1

    # Laser model
    laser_model_type: likelihood_field
    max_beams: 180
    laser_min_range: 0.25
    laser_max_range: 8.0
    laser_likelihood_max_dist: 1.0

    # More tolerant for 3D LiDAR -> 2D LaserScan
    z_hit: 0.9
    z_rand: 0.1
    sigma_hit: 0.2

    # Odometry noise model
    alpha1: 0.06
    alpha2: 0.03
    alpha3: 0.08
    alpha4: 0.04
    alpha5: 0.03

    # Update more often during rotation
    update_min_d: 0.03
    update_min_a: 0.03

    # TF
    tf_broadcast: true
    transform_tolerance: 0.5

    # Initial pose
    set_initial_pose: false
    always_reset_initial_pose: false

    # Optional recovery behavior
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /dlio/odom_node/odom
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.3
    odom_topic: /dlio/odom_node/odom

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false

      # Differential / tracked robot
      min_vel_x: -0.40
      max_vel_x: 0.40
      min_vel_y: 0.0
      max_vel_y: 0.0

      max_vel_theta: 0.80

      min_speed_xy: 0.0
      max_speed_xy: 0.40
      min_speed_theta: 0.0

      acc_lim_x: 0.4
      acc_lim_y: 0.0
      acc_lim_theta: 0.8

      decel_lim_x: -0.4
      decel_lim_y: 0.0
      decel_lim_theta: -0.8

      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 30

      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5

      xy_goal_tolerance: 0.10
      trans_stopped_velocity: 0.05
      theta_stopped_velocity: 0.05

      short_circuit_trajectory_evaluation: true
      stateful: true

      critics: [
        "RotateToGoal",
        "Oscillation",
        "BaseObstacle",
        "GoalAlign",
        "PathAlign",
        "PathDist",
        "GoalDist"
      ]

      BaseObstacle.scale: 0.05
      PathDist.scale: 24.0
      GoalDist.scale: 16.0
      GoalAlign.scale: 8.0
      PathAlign.scale: 10.0
      RotateToGoal.scale: 8.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: false

behavior_server:
  ros__parameters:
    use_sim_time: false

    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint

    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"

    backup:
      plugin: "nav2_behaviors::BackUp"

    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"

    wait:
      plugin: "nav2_behaviors::Wait"

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false

      update_frequency: 5.0
      publish_frequency: 2.0

      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 0.5

      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05

      footprint: "[[0.30, 0.35], [0.30, -0.35], [-0.30, -0.35], [-0.30, 0.35]]"

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan

        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 6.0
          obstacle_min_range: 0.25
          raytrace_max_range: 7.0
          raytrace_min_range: 0.25
          max_obstacle_height: 2.0
          min_obstacle_height: -0.2

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.35
        cost_scaling_factor: 5.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false

      update_frequency: 2.0
      publish_frequency: 1.0
      always_send_full_costmap: true

      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 0.5

      resolution: 0.05
      track_unknown_space: true

      footprint: "[[0.30, 0.35], [0.30, -0.35], [-0.30, -0.35], [-0.30, 0.35]]"

      # Important: your previous config defined obstacle_layer but did not include it here.
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan

        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 6.0
          obstacle_min_range: 0.25
          raytrace_max_range: 7.0
          raytrace_min_range: 0.25
          max_obstacle_height: 2.0
          min_obstacle_height: -0.2

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.35
        cost_scaling_factor: 3.0

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "/home/mono/ros2_ws/src/bartbot_nav/map/map.yaml"

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - map_server
      - amcl
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
      - waypoint_follower